name: futurmeal

services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile.shaya.dev
    image: futurmeal-php-dev:latest
    container_name: futurmeal_php
    user: "1000:1000"
    working_dir: /var/www/html
    environment:
      APP_ENV: "${APP_ENV:-local}"
      HOME: /var/www/html/.home
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - futurmeal-net

  nginx:
    image: nginx:alpine
    container_name: futurmeal_nginx
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/futurmeal-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - futurmeal-net
      - dev_gateway_net

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE:-futurmeal}"
    volumes:
      - futurmeal-mysql:/var/lib/mysql
    networks:
      - futurmeal-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    networks:
      - futurmeal-net

networks:
  futurmeal-net:
    driver: bridge
  dev_gateway_net:
    external: true

volumes:
  futurmeal-mysql:
